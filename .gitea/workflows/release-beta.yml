      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install libsodium
        run: |
          apt-get update && apt-get install -y libsodium-dev pkg-config libssl-dev
      - name: Clone IronRDP patch
        run: |
          git clone --depth=1 --branch=master https://github.com/Devolutions/IronRDP.git /tmp/ironrdp-patch
