name: Auto Tag

# Runs on every merge to master — reads the latest semver tag, increments
# the patch version, pushes a new tag, then runs release builds in this workflow.
# workflow_dispatch allows manual triggering when Gitea drops a push event.

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: auto-tag-master
  cancel-in-progress: false

jobs:
  autotag:
    runs-on: linux-amd64
    container:
      image: alpine:latest
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - name: Bump version, edit config files, and create tag
        id: bump
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          apk add --no-cache curl jq git

          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"

          # Checkout master so we can read versions and commit the bump back
          git init
          git remote add origin "http://oauth2:${RELEASE_TOKEN}@172.0.0.29:3000/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout FETCH_HEAD
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions@local"

          # Read the version declared in Cargo.toml
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          CARGO_TAG="v${CARGO_VERSION}"
          echo "Cargo.toml declares: $CARGO_TAG"

          # Get the latest clean semver tag (vX.Y.Z only, ignore beta/rc suffixes)
          LATEST=$(curl -s "$API/tags?limit=50" \
            -H "Authorization: token $RELEASE_TOKEN" | \
            jq -r '.[].name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | \
            sort -V | tail -1)
          echo "Latest stable tag: ${LATEST:-none}"

          # Version resolution policy:
          #   - No prior tag            → use Cargo.toml as-is.
          #   - Cargo.toml > latest tag → use Cargo.toml. This is how an explicit
          #                               MAJOR (or higher) bump is signalled from a
          #                               beta PR; master never invents a major itself.
          #   - Cargo.toml <= latest    → default MINOR bump off the latest tag
          #                               (vX.Y.Z → vX.(Y+1).0). Every beta→master
          #                               promotion ships a new minor stable.
          if [ -z "$LATEST" ]; then
            NEXT="$CARGO_TAG"
          elif [ "$CARGO_TAG" != "$LATEST" ] && \
               [ "$(printf '%s\n' "$LATEST" "$CARGO_TAG" | sort -V | tail -1)" = "$CARGO_TAG" ]; then
            NEXT="$CARGO_TAG"
            echo "Cargo.toml $CARGO_TAG is ahead of $LATEST — honoring explicit bump"
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
            echo "Default minor bump: $LATEST → $NEXT"
          fi

          NEW_VERSION="${NEXT#v}"
          echo "Resolved next release: $NEXT (version $NEW_VERSION)"

          # If the resolved version differs from what the config files declare,
          # rewrite all version-bearing files so the built binaries report $NEXT,
          # then commit the bump back to master ([skip ci] avoids re-triggering).
          if [ "$NEW_VERSION" != "$CARGO_VERSION" ]; then
            echo "Updating version files: $CARGO_VERSION → $NEW_VERSION"

            # src-tauri/Cargo.toml — first 'version = "..."' (the [package] one)
            sed -i "0,/^version = \".*\"/s//version = \"${NEW_VERSION}\"/" src-tauri/Cargo.toml

            # package.json — top-level "version": "..."
            sed -i "0,/\"version\": \".*\"/s//\"version\": \"${NEW_VERSION}\"/" package.json

            # src-tauri/tauri.conf.json — top-level "version": "..."
            sed -i "0,/\"version\": \".*\"/s//\"version\": \"${NEW_VERSION}\"/" src-tauri/tauri.conf.json

            # src-tauri/Cargo.lock — the version line for the trcaa crate entry
            sed -i "/^name = \"trcaa\"/{n;s/^version = \".*\"/version = \"${NEW_VERSION}\"/}" src-tauri/Cargo.lock

            # Unshallow so pushing a new commit to master is accepted (Gitea
            # rejects branch updates from a shallow clone).
            git fetch --unshallow origin 2>/dev/null \
              || git fetch --depth=2147483647 origin 2>/dev/null || true

            git add src-tauri/Cargo.toml package.json src-tauri/tauri.conf.json src-tauri/Cargo.lock
            git commit -m "chore: release ${NEXT} [skip ci]"
            git push origin HEAD:master
            echo "✓ Version bump committed to master"
          else
            echo "Config files already at $NEW_VERSION — no bump commit needed"
          fi

          # Tag the current HEAD — the bump commit when one was made, otherwise the
          # merge commit (explicit-ahead or first-tag case).
          if git ls-remote --exit-code --tags origin "refs/tags/$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists; builds will target this tag."
          else
            git tag -a "$NEXT" -m "Release $NEXT"
            git push origin "refs/tags/$NEXT"
            echo "Tag $NEXT pushed successfully"
          fi

          # Export for downstream jobs — avoids git-describe guessing wrong tag
          echo "release_tag=$NEXT" >> "$GITHUB_OUTPUT"

  changelog:
    needs: autotag
    runs-on: linux-amd64
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          set -eu
          apk add --no-cache git curl jq

      - name: Checkout (full history + all tags)
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          git init
          git remote add origin \
            "http://oauth2:${RELEASE_TOKEN}@172.0.0.29:3000/${GITHUB_REPOSITORY}.git"
          git fetch --unshallow origin || git fetch --depth=2147483647 origin || true
          git fetch --tags origin
          # Base the CHANGELOG commit on the CURRENT master tip. The autotag job
          # may have just pushed a "chore: release vX.Y.0 [skip ci]" version-bump
          # commit to master; checking out $GITHUB_SHA (the pre-bump merge commit)
          # would make the later 'git push origin HEAD:master' a non-fast-forward.
          git fetch origin master
          git checkout -B master FETCH_HEAD
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions@local"

      - name: Install git-cliff
        run: |
          set -eu
          CLIFF_VER="2.7.0"
          curl -fsSL \
            "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VER}/git-cliff-${CLIFF_VER}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz --strip-components=1 -C /usr/local/bin \
              "git-cliff-${CLIFF_VER}/git-cliff"

      - name: Generate changelog
        env:
          RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
        run: |
          set -eu
          CURRENT_TAG="${RELEASE_TAG}"
          echo "Building changelog for $CURRENT_TAG"

          # Verify the tag is present locally after fetch
          if ! git rev-parse "refs/tags/${CURRENT_TAG}" >/dev/null 2>&1; then
            echo "ERROR: tag ${CURRENT_TAG} not found locally after fetch"
            exit 1
          fi

          # Generate changelog for current tag only (range: PREV_TAG..CURRENT_TAG)
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            # Generate release body for this tag only (commits since previous tag)
            git-cliff --config cliff.toml "${PREV_TAG}..${CURRENT_TAG}" > /tmp/release_body.md || true
            # Generate full CHANGELOG.md from all tags
            git-cliff --config cliff.toml --output CHANGELOG.md
          else
            echo "No previous tag found, generating from git commits"
            git log --pretty=format:"- %s" > /tmp/release_body.md || true
            git-cliff --config cliff.toml --output CHANGELOG.md
          fi
          echo "=== Release body preview ==="
          cat /tmp/release_body.md

      - name: Create or update Gitea release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
        run: |
          set -eu
          TAG="${RELEASE_TAG}"
          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"

          # Try to find an existing release for this tag
          RELEASE_ID=$(curl -s "$API/releases/tags/$TAG" \
            -H "Authorization: token $RELEASE_TOKEN" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            # First run: changelog job owns release creation so build jobs
            # never race against a missing release object
            echo "Creating release $TAG..."
            IS_PRERELEASE="false"
            if echo "$TAG" | grep -qE '-(rc|alpha|beta|pre|dev)'; then
              IS_PRERELEASE="true"
            fi
            RELEASE_ID=$(jq -n \
              --arg tag "$TAG" \
              --arg name "TFTSR $TAG" \
              --rawfile body /tmp/release_body.md \
              --argjson prerelease "$IS_PRERELEASE" \
              '{tag_name: $tag, name: $name, body: $body, draft: true, prerelease: $prerelease}' \
              | curl -sf -X POST "$API/releases" \
                  -H "Authorization: token $RELEASE_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data @- \
              | jq -r '.id')
            echo "✓ Release created (id=$RELEASE_ID, prerelease=$IS_PRERELEASE)"
          else
            # Re-run: patch the body only
            echo "Updating existing release $TAG (id=$RELEASE_ID)..."
            jq -n --rawfile body /tmp/release_body.md '{body: $body}' \
              | curl -sf -X PATCH "$API/releases/$RELEASE_ID" \
                  -H "Authorization: token $RELEASE_TOKEN" \
                  -H "Content-Type: application/json" \
                  --data @-
            echo "✓ Release body updated"
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to create or locate release for $TAG"
            exit 1
          fi

      - name: Commit CHANGELOG.md to master
        env:
          RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Unexpected tag format: $TAG"
            exit 1
          fi
          git add CHANGELOG.md
          # Only commit if CHANGELOG.md actually changed — avoids ambiguous
          # exit-code handling from 'git commit || echo' with set -e
          if git diff --staged --quiet; then
            echo "No CHANGELOG.md changes to commit"
          else
            git commit -m "chore: update CHANGELOG.md for ${TAG} [skip ci]"
          fi
          # HEAD:master works in detached HEAD state; 'git push origin master'
          # would fail because there is no local branch named master
          git push origin HEAD:master
          echo "✓ CHANGELOG.md committed to master"

      - name: Upload CHANGELOG.md as release asset
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
        run: |
          set -eu
          TAG="${RELEASE_TAG}"
          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"
          RELEASE_ID=$(curl -sf "$API/releases/tags/$TAG" \
            -H "Authorization: token $RELEASE_TOKEN" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Could not find release for tag $TAG"
            exit 1
          fi
          # Delete existing asset if present to allow re-upload
          EXISTING_ID=$(curl -sf "$API/releases/$RELEASE_ID" \
            -H "Authorization: token $RELEASE_TOKEN" \
            | jq -r '.assets[]? | select(.name == "CHANGELOG.md") | .id')
          if [ -n "$EXISTING_ID" ]; then
            curl -sf -X DELETE "$API/releases/$RELEASE_ID/assets/$EXISTING_ID" \
              -H "Authorization: token $RELEASE_TOKEN"
          fi
          curl -sf -X POST "$API/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -F "attachment=@CHANGELOG.md;filename=CHANGELOG.md"
          echo "✓ CHANGELOG.md uploaded"

  wiki-sync:
    runs-on: linux-amd64
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: apk add --no-cache git

      - name: Checkout main repository
        run: |
          git init
          git remote add origin http://172.0.0.29:3000/sarman/tftsr-devops_investigation.git
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout FETCH_HEAD

      - name: Configure git
        run: |
          git config --global user.email "actions@gitea.local"
          git config --global user.name "Gitea Actions"
          git config --global credential.helper ''

      - name: Clone and sync wiki
        env:
          WIKI_TOKEN: ${{ secrets.Wiki }}
        run: |
          cd /tmp
          if [ -n "$WIKI_TOKEN" ]; then
            WIKI_URL="http://${WIKI_TOKEN}@172.0.0.29:3000/sarman/tftsr-devops_investigation.wiki.git"
          else
            WIKI_URL="http://172.0.0.29:3000/sarman/tftsr-devops_investigation.wiki.git"
          fi

          if ! git clone "$WIKI_URL" wiki 2>/dev/null; then
            echo "Wiki doesn't exist yet, creating initial structure..."
            mkdir -p wiki
            cd wiki
            git init
            git checkout -b master
            echo "# Wiki" > Home.md
            git add Home.md
            git commit -m "Initial wiki commit"
            git remote add origin "$WIKI_URL"
          fi

          cd /tmp/wiki
          if [ -d "$GITHUB_WORKSPACE/docs/wiki" ]; then
            cp -v "$GITHUB_WORKSPACE"/docs/wiki/*.md . 2>/dev/null || echo "No wiki files to copy"
          fi

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "docs: sync from docs/wiki/ at commit ${GITHUB_SHA:0:8}"
            echo "Pushing to wiki..."
            if git push origin master; then
              echo "✓ Wiki successfully synced"
            else
              echo "⚠ Wiki push failed - check token permissions"
              exit 1
            fi
          else
            echo "No wiki changes to commit"
          fi

      - name: Mirror wiki to GitHub
        env:
          GH_RELEASE_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          set -eu
          GH_WIKI_URL="https://${GH_RELEASE_TOKEN}@github.com/armconsol/tftsr-devops_investigation.wiki.git"

          cd /tmp
          rm -rf ghwiki
          # The GitHub wiki git repo only exists after the first page has been
          # created via the web UI. If it isn't initialised yet, warn and skip
          # rather than failing the release pipeline.
          if ! git clone "$GH_WIKI_URL" ghwiki 2>/dev/null; then
            echo "⚠ GitHub wiki not initialised — create the first page once at"
            echo "  https://github.com/armconsol/tftsr-devops_investigation/wiki then re-run."
            exit 0
          fi

          cd /tmp/ghwiki
          if [ -d "$GITHUB_WORKSPACE/docs/wiki" ]; then
            cp -v "$GITHUB_WORKSPACE"/docs/wiki/*.md . 2>/dev/null || echo "No wiki files to copy"
          fi

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "docs: sync from docs/wiki/ at commit ${GITHUB_SHA:0:8}"
            if git push origin HEAD; then
              echo "✓ GitHub wiki successfully synced"
            else
              echo "⚠ GitHub wiki push failed - check token permissions"
              exit 1
            fi
          else
            echo "No GitHub wiki changes to commit"
          fi

  build-linux-amd64:
    needs: autotag
    runs-on: linux-amd64
    container:
      image: 172.0.0.29:3000/sarman/tftsr-linux-amd64:rust1.89-node22
    env:
      RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin http://172.0.0.29:3000/sarman/tftsr-devops_investigation.git
          git fetch --depth=1 origin "refs/tags/${RELEASE_TAG}"
          git checkout FETCH_HEAD
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-linux-amd64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-linux-amd64-
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install libsodium
        run: |
          apt-get update && apt-get install -y libsodium-dev pkg-config
      - name: Clone IronRDP patch
        run: |
          # Clone from our fork until upstream PR #1398 merges
          # https://github.com/Devolutions/IronRDP/pull/1398
          # Using branch ref (not commit hash) to get latest Copilot review fixes
          # TODO: Revert to upstream crates.io version once PR merges
          git clone --depth=1 --branch=fix/rdp6-bitmap-stride-mismatch https://github.com/armconsol/IronRDP.git /tmp/ironrdp-patch
          echo "IronRDP patch cloned from armconsol/IronRDP fix branch"
      - name: Build
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          npm ci --legacy-peer-deps
          CI=true npx tauri build --target x86_64-unknown-linux-gnu
      - name: Upload artifacts
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"
          TAG="${RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "ERROR: release_tag from autotag job is empty."
            exit 1
          fi
          echo "Creating release for $TAG..."
          curl -sf -X POST "$API/releases" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"TFTSR $TAG\",\"body\":\"Release $TAG\",\"draft\":false}" || true
          RELEASE_ID=$(curl -sf "$API/releases/tags/$TAG" \
            -H "Authorization: token $RELEASE_TOKEN" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get release ID for $TAG"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          ARTIFACTS=$(find src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" \))
          if [ -z "$ARTIFACTS" ]; then
            echo "ERROR: No Linux amd64 artifacts were found to upload."
            exit 1
          fi
          printf '%s\n' "$ARTIFACTS" | while IFS= read -r f; do
            NAME=$(basename "$f")
            UPLOAD_NAME="linux-amd64-$NAME"
            echo "Uploading $UPLOAD_NAME..."
            EXISTING_IDS=$(curl -sf "$API/releases/$RELEASE_ID" \
              -H "Authorization: token $RELEASE_TOKEN" \
              | jq -r --arg name "$UPLOAD_NAME" '.assets[]? | select(.name == $name) | .id')
            if [ -n "$EXISTING_IDS" ]; then
              printf '%s\n' "$EXISTING_IDS" | while IFS= read -r id; do
                [ -n "$id" ] || continue
                echo "Deleting existing asset id=$id name=$UPLOAD_NAME before upload..."
                curl -sf -X DELETE "$API/releases/$RELEASE_ID/assets/$id" \
                  -H "Authorization: token $RELEASE_TOKEN"
              done
            fi
            RESP_FILE=$(mktemp)
            HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" -X POST "$API/releases/$RELEASE_ID/assets" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -F "attachment=@$f;filename=$UPLOAD_NAME")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Uploaded $UPLOAD_NAME"
            else
              echo "✗ Upload failed for $UPLOAD_NAME (HTTP $HTTP_CODE)"
              python -c 'import pathlib,sys;print(pathlib.Path(sys.argv[1]).read_text(errors="replace")[:2000])' "$RESP_FILE"
              exit 1
            fi
          done

  build-windows-amd64:
    needs: autotag
    runs-on: linux-amd64
    container:
      image: 172.0.0.29:3000/sarman/tftsr-windows-cross:rust1.89-node22
    env:
      RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin http://172.0.0.29:3000/sarman/tftsr-devops_investigation.git
          git fetch --depth=1 origin "refs/tags/${RELEASE_TAG}"
          git checkout FETCH_HEAD
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-windows-
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install libsodium
        run: |
          apt-get update && apt-get install -y libsodium-dev pkg-config
      - name: Clone IronRDP patch
        run: |
          # Clone from our fork until upstream PR #1398 merges
          # https://github.com/Devolutions/IronRDP/pull/1398
          # Using branch ref (not commit hash) to get latest Copilot review fixes
          # TODO: Revert to upstream crates.io version once PR merges
          git clone --depth=1 --branch=fix/rdp6-bitmap-stride-mismatch https://github.com/armconsol/IronRDP.git /tmp/ironrdp-patch
          echo "IronRDP patch cloned from armconsol/IronRDP fix branch"
      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps
      - name: Build
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          CXX_x86_64_pc_windows_gnu: x86_64-w64-mingw32-g++
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          # Match release-beta.yml: allow openssl-sys to use vendored OpenSSL
          OPENSSL_STATIC: "1"
          OPENSSL_NO_VENDOR: "0"
        run: |
          CI=true npx tauri build --target x86_64-pc-windows-gnu
      - name: Upload artifacts
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"
          TAG="${RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "ERROR: release_tag from autotag job is empty."
            exit 1
          fi
          echo "Creating release for $TAG..."
          curl -sf -X POST "$API/releases" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"TFTSR $TAG\",\"body\":\"Release $TAG\",\"draft\":false}" || true
          RELEASE_ID=$(curl -sf "$API/releases/tags/$TAG" \
            -H "Authorization: token $RELEASE_TOKEN" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get release ID for $TAG"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          ARTIFACTS=$(find src-tauri/target/x86_64-pc-windows-gnu/release/bundle -type f \
            \( -name "*.exe" -o -name "*.msi" \) 2>/dev/null)
          if [ -z "$ARTIFACTS" ]; then
            echo "ERROR: No Windows amd64 artifacts were found to upload."
            exit 1
          fi
          printf '%s\n' "$ARTIFACTS" | while IFS= read -r f; do
            NAME=$(basename "$f")
            echo "Uploading $NAME..."
            EXISTING_IDS=$(curl -sf "$API/releases/$RELEASE_ID" \
              -H "Authorization: token $RELEASE_TOKEN" \
              | jq -r --arg name "$NAME" '.assets[]? | select(.name == $name) | .id')
            if [ -n "$EXISTING_IDS" ]; then
              printf '%s\n' "$EXISTING_IDS" | while IFS= read -r id; do
                [ -n "$id" ] || continue
                echo "Deleting existing asset id=$id name=$NAME before upload..."
                curl -sf -X DELETE "$API/releases/$RELEASE_ID/assets/$id" \
                  -H "Authorization: token $RELEASE_TOKEN"
              done
            fi
            RESP_FILE=$(mktemp)
            HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" -X POST "$API/releases/$RELEASE_ID/assets" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -F "attachment=@$f;filename=$NAME")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Uploaded $NAME"
            else
              echo "✗ Upload failed for $NAME (HTTP $HTTP_CODE)"
              python -c 'import pathlib,sys;print(pathlib.Path(sys.argv[1]).read_text(errors="replace")[:2000])' "$RESP_FILE"
              exit 1
            fi
          done

  build-macos-arm64:
    needs: autotag
    runs-on: macos-arm64
    timeout-minutes: 120
    env:
      RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin http://172.0.0.29:3000/sarman/tftsr-devops_investigation.git
          git fetch --depth=1 origin "refs/tags/${RELEASE_TAG}"
          git checkout FETCH_HEAD
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-macos-
      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target/aarch64-apple-darwin
          key: ${{ runner.os }}-cargo-macos-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-macos-target-
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Clean up previous IronRDP patch
        run: |
          # macOS runners are persistent, so clean up from previous builds
          rm -rf /tmp/ironrdp-patch
          echo "Cleaned up /tmp/ironrdp-patch"
      - name: Clone IronRDP patch
        run: |
          # Clone from our fork until upstream PR #1398 merges
          # https://github.com/Devolutions/IronRDP/pull/1398
          # Using branch ref (not commit hash) to get latest Copilot review fixes
          # TODO: Revert to upstream crates.io version once PR merges
          git clone --depth=1 --branch=fix/rdp6-bitmap-stride-mismatch https://github.com/armconsol/IronRDP.git /tmp/ironrdp-patch
          echo "IronRDP patch cloned from armconsol/IronRDP fix branch"
      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          npm ci --legacy-peer-deps
          rustup target add aarch64-apple-darwin
          CI=true npx tauri build --target aarch64-apple-darwin --bundles app
          APP=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ -z "$APP" ]; then
            echo "ERROR: Could not find macOS app bundle"
            exit 1
          fi
          APP_NAME=$(basename "$APP" .app)
          codesign --deep --force --sign - "$APP"
          mkdir -p src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          DMG=src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/${APP_NAME}.dmg
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP" -ov -format UDZO "$DMG"
      - name: Upload artifacts
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -eu
          API="http://172.0.0.29:3000/api/v1/repos/$GITHUB_REPOSITORY"
          TAG="${RELEASE_TAG}"
          if [ -z "$TAG" ]; then
            echo "ERROR: release_tag from autotag job is empty."
            exit 1
          fi
          echo "Creating release for $TAG..."
          curl -sf -X POST "$API/releases" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"TFTSR $TAG\",\"body\":\"Release $TAG\",\"draft\":false}" || true
          RELEASE_ID=$(curl -sf "$API/releases/tags/$TAG" \
            -H "Authorization: token $RELEASE_TOKEN" | jq -r '.id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get release ID for $TAG"
            exit 1
          fi
          echo "Release ID: $RELEASE_ID"
          ARTIFACTS=$(find src-tauri/target/aarch64-apple-darwin/release/bundle -type f -name "*.dmg")
          if [ -z "$ARTIFACTS" ]; then
            echo "ERROR: No macOS arm64 DMG artifacts were found to upload."
            exit 1
          fi
          printf '%s\n' "$ARTIFACTS" | while IFS= read -r f; do
            NAME=$(basename "$f")
            echo "Uploading $NAME..."
            EXISTING_IDS=$(curl -sf "$API/releases/$RELEASE_ID" \
              -H "Authorization: token $RELEASE_TOKEN" \
              | jq -r --arg name "$NAME" '.assets[]? | select(.name == $name) | .id')
            if [ -n "$EXISTING_IDS" ]; then
              printf '%s\n' "$EXISTING_IDS" | while IFS= read -r id; do
                [ -n "$id" ] || continue
                echo "Deleting existing asset id=$id name=$NAME before upload..."
                curl -sf -X DELETE "$API/releases/$RELEASE_ID/assets/$id" \
                  -H "Authorization: token $RELEASE_TOKEN"
              done
            fi
            RESP_FILE=$(mktemp)
            HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" -X POST "$API/releases/$RELEASE_ID/assets" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -F "attachment=@$f;filename=$NAME")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Uploaded $NAME"
            else
              echo "✗ Upload failed for $NAME (HTTP $HTTP_CODE)"
              python -c 'import pathlib,sys;print(pathlib.Path(sys.argv[1]).read_text(errors="replace")[:2000])' "$RESP_FILE"
              exit 1
            fi
          done

  build-linux-arm64:
    needs: autotag
    runs-on: linux-amd64
    container:
      image: 172.0.0.29:3000/sarman/tftsr-linux-arm64:rust1.89-node22
    env:
      RELEASE_TAG: ${{ needs.autotag.outputs.release_tag }}
    steps:
      - name: Checkout
        run: |
          git init
          git remote add origin http://172.0.0.29:3000/sarman/tftsr-devops_investigation.git
          git fetch --depth=1 origin "refs/tags/${RELEASE_TAG}"
          git checkout FETCH_HEAD
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-arm64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-arm64-
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install libsodium
        run: |
          apt-get update && apt-get install -y libsodium-dev pkg-config libssl-dev
      - name: Clone IronRDP patch
        run: |
          # Clone from our fork until upstream PR #1398 merges
          # https://github.com/Devolutions/IronRDP/pull/1398
          # Using branch ref (not commit hash) to get latest Copilot review fixes
          # TODO: Revert to upstream crates.io version once PR merges
          git clone --depth=1 --branch=fix/rdp6-bitmap-stride-mismatch https://github.com/armconsol/IronRDP.git /tmp/ironrdp-patch
          echo "IronRDP patch cloned from armconsol/IronRDP fix branch"
      - name: Build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
